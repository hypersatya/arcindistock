<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc-Stoke Testnet</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    
    <style>
        :root {
            --bg: #05070a;
            --card: #0f172a;
            --accent: #38bdf8;
            --success: #4ade80;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: var(--card);
            border-bottom: 1px solid #1e293b;
        }

        .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); }

        #connectBtn {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        #connectBtn:hover { opacity: 0.9; transform: translateY(-1px); }

        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            padding: 40px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .chart-card, .trade-card {
            background: var(--card);
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 24px;
        }

        .price-display {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--success);
            margin: 10px 0;
        }

        .input-group {
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input {
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
        }

        .buy-btn {
            background: var(--success);
            color: #064e3b;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }

        .status-msg {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 15px;
            text-align: center;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ARC-STOKE</div>
        <button id="connectBtn">Connect Wallet</button>
    </nav>

    <div class="container">
        <div class="chart-card">
            <h3 style="margin:0">Market Trend (AAPL/TEST)</h3>
            <canvas id="stockChart" style="margin-top:20px"></canvas>
        </div>

        <div class="trade-card">
            <h3 style="margin:0">Trade Stocks</h3>
            <div class="price-display" id="stockPrice">$154.20</div>
            
            <div class="input-group">
                <label>Amount to Buy</label>
                <input type="number" id="tradeAmt" placeholder="0.00" step="0.1">
            </div>

            <button class="buy-btn" id="buyAction">Place Testnet Order</button>
            <div class="status-msg" id="walletStatus">Wallet not connected (Arc Testnet)</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
